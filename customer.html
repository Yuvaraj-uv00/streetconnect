<!DOCTYPE html>
<html>
<head>
    <title>Customer - StreetConnect</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: #fafafa;
        }

        .header {
            background: #e23744;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .tagline {
            text-align: center;
            color: gray;
            margin: 5px;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: auto;
        }

        .vendor-card {
            background: white;
            margin-top: 15px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .vendor-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .content {
            padding: 15px;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
        }

        .food {
            color: #555;
        }

        .location {
            font-size: 13px;
            color: gray;
        }

        .rating {
            background: green;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            float: right;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #e23744;
            color: white;
            border: none;
            border-radius: 8px;
        }

    </style>
</head>

<body>

<div class="header">🍔 Explore Street Food</div>
<div class="tagline">“Discover hidden gems near you 🌟”</div>

<div class="container">
    <button onclick="getVendors()">🔍 Find Vendors</button>
    <div id="list"></div>
</div>

<script>
const API = "http://127.0.0.1:5000";

function getVendors() {
    fetch(API + "/get_vendors")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(v => {
            const card = document.createElement("div");
            card.className = "vendor-card";

            card.innerHTML = `
                <img class="vendor-img" src="${v.image || 'https://source.unsplash.com/600x400/?food'}">

                <div class="content">
                    <div class="name">
                        ${v.name}
                        <span class="rating">⭐ ${v.rating || 4.2}</span>
                    </div>

                    <div class="food">🍽 ${v.food}</div>
                    <div class="location">📍 ${v.location}</div>
                </div>
            `;

            list.appendChild(card);
        });
    });
}
</script>

</body>
</html>
