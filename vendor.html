<!DOCTYPE html>
<html>
<head>
    <title>Vendor - StreetConnect</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: #fafafa;
        }

        .header {
            background: #e23744;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .tagline {
            text-align: center;
            color: gray;
            margin-top: 5px;
        }

        .container {
            max-width: 500px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #e23744;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #c92d39;
        }

    </style>
</head>

<body>

<div class="header">👨‍🍳 Join StreetConnect</div>
<div class="tagline">“Turn your street food into a brand 🚀”</div>

<div class="container">
    <div class="card">
        <h3>Add Your Stall</h3>

        <input id="name" placeholder="Stall Name">
        <input id="food" placeholder="Food Type (e.g. Momos, Dosa)">
        <input id="location" placeholder="Location">
        <input id="image" placeholder="Image URL (optional)">
        <input id="rating" placeholder="Rating (1-5)">

        <button onclick="addVendor()">🚀 Register Vendor</button>
    </div>
</div>

<script>
const API = "http://127.0.0.1:5000";

function addVendor() {
    const name = document.getElementById("name").value;
    const food = document.getElementById("food").value;
    const location = document.getElementById("location").value;
    const image = document.getElementById("image").value;
    const rating = document.getElementById("rating").value;

    fetch(API + "/add_vendor", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, food, location, image, rating})
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}
</script>

</body>
</html>
