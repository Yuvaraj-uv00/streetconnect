<!DOCTYPE html>
<html>
<head>
    <title>StreetConnect</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: #fafafa;
        }

        /* Header */
        .header {
            background: #e23744;
            color: white;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: auto;
        }

        /* Input Card */
        .card {
            background: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #e23744;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #c92d39;
        }

        /* Vendor Cards */
        .vendor-card {
            background: white;
            margin-top: 12px;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            text-align: left;
        }

        .vendor-name {
            font-size: 18px;
            font-weight: bold;
        }

        .food {
            color: #555;
            margin-top: 5px;
        }

        .location {
            font-size: 13px;
            color: gray;
            margin-top: 5px;
        }

    </style>
</head>

<body>

<div class="header">🍔 StreetConnect</div>

<div class="container">

    <!-- Vendor Form -->
    <div class="card">
        <h3>Add Vendor</h3>

        <input id="name" placeholder="Vendor Name">
        <input id="food" placeholder="Food Item">
        <input id="location" placeholder="Location">

        <button onclick="addVendor()">Add Vendor</button>
    </div>

    <!-- Vendor List -->
    <div class="card">
        <h3>Nearby Vendors</h3>

        <button onclick="getVendors()">Load Vendors</button>

        <div id="list"></div>
    </div>

</div>

<script>
const API = "http://127.0.0.1:5000";

// Add Vendor
function addVendor() {
    const name = document.getElementById("name").value;
    const food = document.getElementById("food").value;
    const location = document.getElementById("location").value;

    fetch(API + "/add_vendor", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, food, location})
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
    });
}

// Get Vendors
function getVendors() {
    fetch(API + "/get_vendors")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(v => {
            const card = document.createElement("div");
            card.className = "vendor-card";

            card.innerHTML = `
                <div class="vendor-name">${v[1]}</div>
                <div class="food">🍽 ${v[2]}</div>
                <div class="location">📍 ${v[3]}</div>
            `;

            list.appendChild(card);
        });
    });
}
</script>

</body>
</html>
